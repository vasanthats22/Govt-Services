<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Stackly - Government Services Header</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* Fixed Header Container */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Professional Government Color Palette - Matching Notification & Other Pages */
        :root {
            --navy: #0B3B5E;
            --teal: #1A6D7A;
            --gold: #D4AF37;
            --light-teal: #E8F4F0;
            --white: #ffffff;
        }

        /* MAIN NAVIGATION - MATCHING GOVERNMENT PAGES */
        .main-nav {
            background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
            box-shadow: 0 4px 20px rgba(11, 59, 94, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            z-index: 1001;
        }

        .logo img {
            height: 80px;
            width: auto;
            display: block;
            border-radius: 8px;
            filter: brightness(0) invert(1);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            list-style: none;
        }

        .nav-item {
            position: relative;
            list-style: none;
        }

        .nav-link {
            color: rgba(255,255,255,0.95);
            text-decoration: none;
            font-weight: 600;
            padding: 0.7rem 1.3rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
            background: transparent;
        }

        .nav-link i {
            font-size: 0.9rem;
            color: var(--gold);
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
            transform: translateY(-2px);
        }

        .nav-link:hover i {
            color: #ffffff;
        }

        /* Services button */
        .services-link {
            background: rgba(212, 175, 55, 0.15);
            color: white;
            font-weight: 700;
            backdrop-filter: blur(5px);
        }

        .services-link i {
            color: var(--gold);
        }

        .services-link:hover {
            background: var(--gold);
            color: var(--navy) !important;
        }

        .services-link:hover i {
            color: var(--navy) !important;
        }

        /* Login button - Gold matching government palette */
        .login-link {
            background: var(--gold);
            color: var(--navy) !important;
            padding: 0.7rem 2rem !important;
            border-radius: 50px !important;
            font-weight: 700 !important;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .login-link i {
            color: var(--navy) !important;
        }

        .login-link:hover {
            background: #e8c44a !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        /* Dropdown for Home */
        .home-dropdown {
            position: absolute;
            top: 52px;
            left: 0;
            background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
            min-width: 200px;
            border-radius: 16px;
            padding: 0.5rem 0;
            box-shadow: 0 10px 30px rgba(11, 59, 94, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 300;
            pointer-events: none;
        }

        .nav-item.dropdown.open .home-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(5px);
            pointer-events: auto;
        }

        .home-dropdown a {
            display: block;
            padding: 0.8rem 1.5rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .home-dropdown a:last-child {
            border-bottom: none;
        }

        .home-dropdown a:hover {
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
            padding-left: 2rem;
        }

        /* Plus icon styling */
        .dropdown-plus {
            font-size: 0.9rem;
            color: var(--gold);
            cursor: pointer;
            padding: 0.5rem;
            margin-left: -5px;
            transition: all 0.3s;
        }

        .dropdown-plus:hover {
            color: #ffffff;
            transform: scale(1.1) rotate(90deg);
        }

        /* Menu toggle for mobile */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            padding: 10px 14px;
            background: rgba(212, 175, 55, 0.15);
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .menu-toggle span {
            width: 24px;
            height: 3px;
            background: var(--gold);
            border-radius: 3px;
            transition: all 0.3s;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Mobile responsiveness */
        @media (max-width: 950px) {
            .nav-menu { display: none; }
            .menu-toggle { display: flex; }
            
            .nav-menu {
                position: fixed;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100vh;
                background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 30px;
                transition: left 0.3s ease;
                z-index: 999;
                padding: 0;
                margin: 0;
                display: flex !important;
            }

            .nav-menu.active {
                left: 0;
            }

            .nav-item {
                width: 100%;
                text-align: center;
            }

            .nav-link {
                font-size: 1.5rem;
                padding: 15px;
                display: inline-flex;
                color: white;
                justify-content: center;
            }

            .nav-link i {
                font-size: 1.2rem;
                color: var(--gold);
            }

            .dropdown-plus {
                font-size: 1.2rem;
                padding: 15px;
                color: var(--gold);
            }

            .home-dropdown {
                position: static;
                background: rgba(212, 175, 55, 0.1);
                backdrop-filter: blur(5px);
                box-shadow: none;
                margin: 5px auto;
                width: 80%;
                border-radius: 15px;
                display: none;
                opacity: 1;
                visibility: visible;
                transform: none;
                border: 1px solid rgba(212, 175, 55, 0.3);
                pointer-events: auto;
            }

            .nav-item.dropdown.open .home-dropdown {
                display: block;
            }

            .home-dropdown a {
                font-size: 1.2rem;
                padding: 12px;
                text-align: center;
                color: rgba(255,255,255,0.9);
            }

            .login-link {
                font-size: 1.4rem !important;
                padding: 12px 40px !important;
                margin-top: 10px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 1.5rem;
            }

            .logo img {
                height: 40px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 0.9rem 1rem;
            }

            .logo img {
                height: 90px;
            }

            .nav-link {
                font-size: 1.3rem !important;
            }

            .home-dropdown a {
                font-size: 1.1rem !important;
            }

            .login-link {
                font-size: 1.3rem !important;
            }
        }

        .fas, .fab {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }
        .fab {
            font-family: 'Font Awesome 6 Brands';
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="main-nav">
            <nav class="navbar">
                <a href="home2.html" class="logo">
                    <img src="Stackly.webp" alt="STACKLY">
                </a>

                <div class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <ul class="nav-menu" id="navMenu">
                    <li class="nav-item dropdown">
                        <a href="home2.html" class="nav-link">Home</a>
                        <i class="fas fa-plus dropdown-plus" data-dropdown="home"></i>
                        <div class="home-dropdown">
                            <a href="home1.html">Homepage 1</a>
                        </div>
                    </li>
                    
                    <li class="nav-item">
                        <a href="careers.html" class="nav-link">Careers</a>
                    </li>
                    
                    <li class="nav-item">
                        <a href="contact.html" class="nav-link">Contact</a>
                    </li>
                    
                    <li class="nav-item">
                        <a href="support.html" class="nav-link services-link">
                            <i class="fas fa-cog"></i> Support
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a href="login2.html" class="nav-link login-link">
                            Login <i class="fas fa-arrow-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <script>
        (function() {
            function closeAllDropdowns(except = null) {
                document.querySelectorAll('.nav-item.dropdown').forEach(d => {
                    if (d !== except) d.classList.remove('open');
                });
            }

            document.querySelectorAll('.dropdown-plus').forEach(plus => {
                plus.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const parentItem = this.closest('.nav-item.dropdown');
                    if (parentItem) {
                        const isOpen = parentItem.classList.contains('open');
                        closeAllDropdowns(isOpen ? parentItem : null);
                        parentItem.classList.toggle('open');
                    }
                });
            });

            document.querySelectorAll('.home-dropdown').forEach(c => {
                c.addEventListener('click', e => e.stopPropagation());
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.nav-item.dropdown')) {
                    closeAllDropdowns();
                }
            });

            const menuToggle = document.getElementById('menuToggle');
            const navMenu = document.getElementById('navMenu');

            if (menuToggle && navMenu) {
                menuToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                    navMenu.classList.toggle('active');
                    if (navMenu.classList.contains('active')) {
                        document.body.style.overflow = 'hidden';
                    } else {
                        document.body.style.overflow = 'auto';
                        closeAllDropdowns();
                    }
                });
            }

            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 950) {
                        if (menuToggle) menuToggle.classList.remove('active');
                        if (navMenu) navMenu.classList.remove('active');
                        document.body.style.overflow = 'auto';
                        closeAllDropdowns();
                    }
                });
            });

            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeAllDropdowns();
                    if (navMenu && navMenu.classList.contains('active')) {
                        menuToggle.classList.remove('active');
                        navMenu.classList.remove('active');
                        document.body.style.overflow = 'auto';
                    }
                }
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth > 950) {
                    if (navMenu && navMenu.classList.contains('active')) {
                        menuToggle.classList.remove('active');
                        navMenu.classList.remove('active');
                        document.body.style.overflow = 'auto';
                    }
                    closeAllDropdowns();
                }
            });
        })();
    </script>
</body>
</html>
